name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - name: Checkout dom-gpu sibling (deps.edn :local/root)
        run: git clone --depth 1 https://github.com/kotoba-lang/dom-gpu ../dom-gpu
      - name: Checkout cssom sibling (deps.edn :local/root)
        run: git clone --depth 1 https://github.com/kotoba-lang/cssom ../cssom
      - name: Checkout htmldom sibling (deps.edn :local/root)
        run: git clone --depth 1 https://github.com/kotoba-lang/htmldom ../htmldom
      - name: Checkout quickjs sibling (deps.edn :local/root)
        run: git clone --depth 1 https://github.com/kotoba-lang/quickjs ../quickjs
      - name: Checkout org-w3-aria sibling (deps.edn :local/root)
        run: git clone --depth 1 https://github.com/kotoba-lang/org-w3-aria ../org-w3-aria
      - run: clojure -M:test
      - run: clojure -M:lint
