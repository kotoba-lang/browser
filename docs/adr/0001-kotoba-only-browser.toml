id = "0001"
title = "kotoba-only browser"
status = "accepted"
maturity = "R1.5"
runtime = "wasm-only"
updated = "2026-07-02"

[scope]
repository = "kotoba-lang/browser"
adr = "docs/adr/0001-kotoba-only-browser.md"
core = "kotoba-only browser and aiueos GUI substrate"
compatibility = "browser-use IBrowser adapter without browser-use changes"

[browser_use]
protocol = "browseruse.browser/IBrowser"
adapter = "browser.browser-use/kotoba-browser"
session_helper = "browser.browser-use/kotoba-session"
state = [
  "url",
  "title",
  "indexed interactive elements",
  "semantic-tree",
  "debug.draw-ops",
  "debug.accessibility-tree",
  "debug.audit-summary",
  "debug.audit-events-tail",
  "debug.host-recorded",
  "debug.navigation",
  "debug.document-input-result",
]

actions = [
  "get_state",
  "extract",
  "wait_for",
  "diagnose",
  "click",
  "click_selector",
  "click_at",
  "type",
  "type_selector",
  "clear",
  "clear_selector",
  "append_text",
  "append_text_selector",
  "check_selector",
  "uncheck",
  "uncheck_selector",
  "select_selector",
  "press",
  "screenshot",
  "focus_element",
  "hover_element",
  "hover_at",
  "scroll_selector",
  "scroll_at",
  "press_key",
  "scroll_to_element",
  "navigation_state",
  "go_forward",
  "reload",
]

recipe_options = [
  "check",
  "select",
  "screenshot",
  "close",
]

[browser_use.extract]
kinds = [
  "semantic",
  "text",
  "accessibility",
  "draw_ops",
  "snapshot",
  "state",
]

[browser_use.wait_for]
conditions = [
  "selector",
  "text",
  "url",
]
kinds = [
  "present",
  "visible",
  "absent",
  "hidden",
]
ambient_sleep = false

[browser_use.diagnose]
inputs = [
  "selector",
  "index",
  "text",
  "url",
]
returns = [
  "ok",
  "matches",
  "candidate-count",
  "elements",
  "debug.history-tail",
]
throws_on_miss = false

[browser_use.navigation_state]
returns = [
  "index",
  "entries",
  "redirects",
  "error",
  "error-document-text",
  "page-generation",
]

[browser_use.screenshot]
format = "kotoba.browser/snapshot"
artifact = "edn"
contains = [
  "url",
  "title",
  "elements",
  "semantic-tree",
  "draw-ops",
  "accessibility-tree",
]

[coverage]
browser_use_tests = 13
browser_use_assertions = 112
browser_tests = 444
browser_assertions = 2503
wasm_ui_tests = 38
wasm_ui_assertions = 161

evidence = [
  "browser.browser-use-test/kotoba-browser-implements-browser-use-protocol-with-existing-actions",
  "browser.browser-use-test/kotoba-browser-can-load-static-html-for-debug",
  "browser.browser-use-test/browser-use-state-resolves-link-and-image-input-urls-against-base-uri",
  "browser.browser-use-test/kotoba-extended-actions-drive-focus-hover-key-and-scroll-to",
  "browser.browser-use-test/kotoba-browser-use-actions-include-compat-wrapper-and-snapshot",
  "browser.browser-use-test/kotoba-browser-use-actions-drive-selector-and-coordinate-form-input",
  "browser.browser-use-test/kotoba-browser-use-wait-for-checks-current-state",
  "browser.browser-use-test/kotoba-browser-use-diagnose-reports-targeting-state-without-throwing",
  "browser.browser-use-test/kotoba-browser-use-actions-expose-navigation-lifecycle",
  "browser.browser-use-test/kotoba-browser-use-extracts-semantic-page-state",
  "browser.browser-use-test/browser-use-recipe-runs-against-kotoba-browser-without-browser-use-changes",
  "browser.browser-use-test/browser-use-recipe-checks-and-selects-through-kotoba-host-capability-opts",
  "browser.browser-use-test/kotoba-session-mirrors-playwright-session-host-shape",
]

[verification]
browser_use = "clojure -M:test:browser-use:browser-use-test -d test-browser-use"
browser = "clojure -M:test"
wasm_ui = "cd ../wasm-ui && clojure -M:test"
