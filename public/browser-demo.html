<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>kotoba-lang/browser demo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b0e14;
      color: #e6ebf5;
      font: 14px/1.5 ui-sans-serif, system-ui, sans-serif;
    }
    .stage {
      position: relative;
      width: 760px;
      height: 1350px;
      border: 1px solid #263246;
      background: #0b0e14;
    }
    canvas {
      position: absolute;
      inset: 0;
      width: 760px;
      height: 1350px;
    }
    .caption {
      position: fixed;
      left: 16px;
      bottom: 12px;
      max-width: calc(100vw - 32px);
      padding: 8px 12px;
      border: 1px solid #263246;
      border-radius: 6px;
      background: rgba(11, 14, 20, 0.92);
      color: #8a97b1;
    }
  </style>
</head>
<body>
  <div class="stage">
    <canvas id="kotoba-gl" width="760" height="1350"></canvas>
    <canvas id="kotoba-text" width="760" height="1350"></canvas>
  </div>
  <div id="status" class="caption">
    kotoba-lang/browser -&gt; real session -&gt; real QuickJS script -&gt; real cssom layout -&gt; real WebGL paint
  </div>
  <script src="/js/browser-demo.js"></script>
</body>
</html>
